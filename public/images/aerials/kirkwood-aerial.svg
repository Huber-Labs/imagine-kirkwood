<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a9a8c"/>
      <stop offset="45%" stop-color="#6b7d6e"/>
      <stop offset="100%" stop-color="#4f5e52"/>
    </linearGradient>
    <linearGradient id="street" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c6660" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3d4540" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soften" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="url(#sky)"/>
  <!-- Roof massing suggestion -->
  <g fill="#556158" opacity="0.55" filter="url(#soften)">
    <rect x="60" y="140" width="90" height="70" rx="2"/>
    <rect x="55" y="390" width="100" height="65" rx="2"/>
    <rect x="210" y="135" width="85" height="75" rx="2"/>
    <rect x="205" y="385" width="95" height="70" rx="2"/>
    <rect x="370" y="130" width="100" height="80" rx="2"/>
    <rect x="365" y="380" width="105" height="75" rx="2"/>
    <rect x="530" y="138" width="88" height="72" rx="2"/>
    <rect x="525" y="388" width="92" height="68" rx="2"/>
    <rect x="690" y="142" width="95" height="78" rx="2"/>
    <rect x="685" y="382" width="98" height="72" rx="2"/>
    <rect x="850" y="148" width="88" height="68" rx="2"/>
    <rect x="845" y="392" width="90" height="65" rx="2"/>
  </g>
  <!-- Kirkwood corridor -->
  <rect x="30" y="248" width="940" height="104" fill="url(#street)" rx="3"/>
  <line x1="50" y1="300" x2="950" y2="300" stroke="#7a8580" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.6"/>
  <!-- Cross streets -->
  <g stroke="#6a756f" stroke-width="2" opacity="0.45">
    <line x1="115" y1="120" x2="115" y2="480"/>
    <line x1="268" y1="115" x2="268" y2="485"/>
    <line x1="432" y1="112" x2="432" y2="488"/>
    <line x1="592" y1="115" x2="592" y2="485"/>
    <line x1="752" y1="120" x2="752" y2="480"/>
  </g>
  <text x="500" y="560" text-anchor="middle" fill="#e8ebe9" font-family="system-ui,sans-serif" font-size="13" opacity="0.5">
    Placeholder  replace with kirkwood-aerial.jpg
  </text>
</svg>
