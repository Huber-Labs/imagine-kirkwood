<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f4f0"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4d0c8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#c8c4bc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4d0c8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="620" width="1600" height="280" fill="url(#ground)"/>
  <!-- Street perspective -->
  <path d="M0 620 L800 480 L1600 620 L1600 900 L0 900 Z" fill="#ddd9d2" opacity="0.5"/>
  <!-- Building silhouettes -->
  <rect x="120" y="320" width="180" height="300" rx="4" fill="#c5c1b8" opacity="0.7"/>
  <rect x="340" y="280" width="220" height="340" rx="4" fill="#bbb7ae" opacity="0.75"/>
  <rect x="620" y="300" width="160" height="320" rx="4" fill="#c5c1b8" opacity="0.65"/>
  <rect x="820" y="260" width="240" height="360" rx="4" fill="#b5b1a8" opacity="0.8"/>
  <rect x="1100" y="310" width="200" height="310" rx="4" fill="#c5c1b8" opacity="0.7"/>
  <rect x="1340" y="290" width="180" height="330" rx="4" fill="#bbb7ae" opacity="0.75"/>
  <!-- Tree canopy hints -->
  <circle cx="280" cy="520" r="55" fill="#a8b5a0" opacity="0.5"/>
  <circle cx="960" cy="510" r="65" fill="#a8b5a0" opacity="0.45"/>
  <circle cx="1280" cy="530" r="50" fill="#a8b5a0" opacity="0.5"/>
  <!-- Horizon line -->
  <line x1="0" y1="620" x2="1600" y2="620" stroke="#c8c4bc" stroke-width="1" opacity="0.6"/>
</svg>
